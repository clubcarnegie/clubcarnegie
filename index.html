<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Club Carnegie — Dashboard</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0f1117;display:flex;align-items:center;justify-content:center;min-height:100vh;font-family:'Inter',system-ui,sans-serif}
.gate{background:#1a1d27;border:1px solid #2a2d3a;border-radius:16px;padding:40px 48px;text-align:center;width:360px}
.logo{margin-bottom:28px}
.logo img{height:40px;filter:brightness(0) invert(1);opacity:.9}
h2{color:#e8eaf0;font-size:18px;font-weight:600;margin-bottom:6px}
p{color:#8b8fa8;font-size:13px;margin-bottom:24px}
input{width:100%;padding:11px 14px;background:#0f1117;border:1px solid #2a2d3a;border-radius:8px;color:#e8eaf0;font-size:14px;outline:none;transition:border .2s}
input:focus{border-color:#4f7cff}
button{width:100%;margin-top:12px;padding:12px;background:#4f7cff;color:#fff;border:none;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer;transition:background .2s}
button:hover{background:#3d6ee8}
.err{color:#ef4444;font-size:12px;margin-top:10px;min-height:18px}
iframe{display:none;position:fixed;inset:0;width:100%;height:100%;border:none;background:#0f1117}
</style>
</head>
<body>
<div class="gate" id="gate">
  <div class="logo"><img src="logo_carnegie.png" alt="Club Carnegie"></div>
  <h2>Acesso restrito</h2>
  <p>Dashboard interno da equipe Club Carnegie</p>
  <input type="password" id="pw" placeholder="Senha" onkeydown="if(event.key==='Enter')check()">
  <button onclick="check()">Entrar</button>
  <div class="err" id="err"></div>
</div>
<iframe id="dash" src="dashboard_carnegie.html"></iframe>
<script>
async function sha256(msg){
  const buf=await crypto.subtle.digest('SHA-256',new TextEncoder().encode(msg));
  return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');
}
async function check(){
  const h=await sha256(document.getElementById('pw').value);
  if(h==='532caba746a4b4ac8315402896cdca54f1af4cd5a357b77452eb8822ab73ed5f'){
    sessionStorage.setItem('cc_auth','1');
    unlock();
  }else{
    document.getElementById('err').textContent='Senha incorreta.';
  }
}
function unlock(){
  document.getElementById('gate').style.display='none';
  const f=document.getElementById('dash');
  f.style.display='block';
}
if(sessionStorage.getItem('cc_auth')==='1')unlock();
</script>
</body>
</html>
